[package]
name = "code-assistant"
version = "0.2.10"
edition = "2021"

[features]
default = ["document-conversion"]
document-conversion = ["code_assistant_core/document-conversion"]

[dependencies]
code_assistant_core = { path = "../code_assistant_core", default-features = false }
ui_gpui = { path = "../ui_gpui" }
ui_terminal = { path = "../ui_terminal" }
command_executor = { path = "../command_executor" }
tools_core = { path = "../tools_core" }
fs_explorer = { path = "../fs_explorer" }
llm = { path = "../llm" }
sandbox = { path = "../sandbox" }
terminal = { path = "../terminal" }

tokio = { version = "1.48", features = ["full"] }
async-channel = "2.5.0"
async-trait = "0.1"

# JSON (de)serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4.5", features = ["derive"] }
open = "5"
dirs = "5.0"

# Date and time handling
chrono = { version = "0.4", features = ["serde"] }

# Agent Client Protocol
agent-client-protocol = { version = "0.9", features = ["unstable"] }
tokio-util = { version = "0.7", features = ["compat"] }

[dev-dependencies]
code_assistant_core = { path = "../code_assistant_core", default-features = false, features = ["test-utils"] }
tempfile = "3.23"
